<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOS — AI Developer Growth OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg-void: #020408;
    --bg-deep: #060c14;
    --bg-surface: #0a1220;
    --bg-elevated: #0f1a2e;
    --bg-card: rgba(15,26,46,0.7);
    --border: rgba(99,179,237,0.1);
    --border-bright: rgba(99,179,237,0.25);
    --text-primary: #e8f4fd;
    --text-secondary: #7fa8c9;
    --text-muted: #3d6080;
    --accent-blue: #3b9eff;
    --accent-cyan: #00d4ff;
    --accent-violet: #8b5cf6;
    --accent-emerald: #10d98a;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --glow-blue: rgba(59,158,255,0.15);
    --glow-violet: rgba(139,92,246,0.15);
    --glow-cyan: rgba(0,212,255,0.1);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 24px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 2px; }

  /* === AURORA BACKGROUND === */
  .aurora {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  .aurora::before {
    content: '';
    position: absolute;
    width: 800px; height: 800px;
    top: -200px; left: -100px;
    background: radial-gradient(circle, rgba(59,158,255,0.08) 0%, transparent 70%);
    animation: aurora1 12s ease-in-out infinite alternate;
  }
  .aurora::after {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    bottom: -100px; right: -100px;
    background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
    animation: aurora2 15s ease-in-out infinite alternate;
  }
  @keyframes aurora1 {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(200px,100px) scale(1.3); }
  }
  @keyframes aurora2 {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(-150px,-100px) scale(1.2); }
  }

  /* === GRID OVERLAY === */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(59,158,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,158,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* === LAYOUT === */
  .app-shell { position: relative; z-index: 1; min-height: 100vh; }

  /* === SIDEBAR === */
  .sidebar {
    position: fixed; left: 0; top: 0; height: 100vh; width: 240px; z-index: 100;
    background: rgba(6,12,20,0.85);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 20px 0;
    transition: width 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s ease;
  }
  .sidebar.collapsed { width: 64px; }
  .sidebar-logo {
    padding: 0 20px 20px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .logo-mark {
    width: 32px; height: 32px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #fff;
    box-shadow: 0 0 20px rgba(59,158,255,0.3);
  }
  .logo-text { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; }
  .logo-text span { color: var(--accent-blue); }

  .nav-section { padding: 0 12px; margin-bottom: 8px; }
  .nav-section-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-muted);
    padding: 0 8px; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: var(--radius-md);
    cursor: pointer; transition: all 0.2s ease;
    font-size: 13.5px; font-weight: 450; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden;
    border: 1px solid transparent;
    position: relative;
    text-decoration: none;
  }
  .nav-item:hover { background: rgba(59,158,255,0.07); color: var(--text-primary); }
  .nav-item.active {
    background: rgba(59,158,255,0.12);
    color: var(--accent-blue);
    border-color: rgba(59,158,255,0.2);
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 20px; background: var(--accent-blue);
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px var(--accent-blue);
  }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; background: var(--accent-violet);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 10px;
  }

  .sidebar-footer {
    margin-top: auto; padding: 16px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: var(--radius-md);
    cursor: pointer; transition: all 0.2s;
  }
  .user-card:hover { background: rgba(255,255,255,0.04); }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #3b9eff, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white;
    box-shadow: 0 0 12px rgba(59,158,255,0.3);
  }
  .user-info { overflow: hidden; }
  .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  /* === MAIN CONTENT === */
  .main-content {
    margin-left: 240px;
    min-height: 100vh;
    transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
    padding: 0;
  }
  .main-content.expanded { margin-left: 64px; }

  /* === TOP BAR === */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(6,12,20,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex; align-items: center; gap: 16px;
  }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-subtitle { font-size: 12px; color: var(--text-muted); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius-md);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s ease; border: none; text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
    color: white;
    box-shadow: 0 0 20px rgba(59,158,255,0.25);
  }
  .btn-primary:hover { box-shadow: 0 0 30px rgba(59,158,255,0.4); transform: translateY(-1px); }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

  /* === PAGE CONTENT === */
  .page { padding: 28px; }
  .page-header { margin-bottom: 28px; }
  .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .page-desc { font-size: 14px; color: var(--text-secondary); }

  /* === CARDS === */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    position: relative; overflow: hidden;
  }
  .card:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,158,255,0.3), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .card:hover::before { opacity: 1; }

  .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 800; line-height: 1; }
  .card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* === SCORE RING === */
  .score-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-value {
    position: absolute;
    font-size: 22px; font-weight: 800;
    text-align: center;
  }
  .score-ring-label { position: absolute; bottom: -2px; font-size: 10px; color: var(--text-muted); }

  /* === PROGRESS BAR === */
  .progress-bar {
    height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(59,158,255,0.5);
  }

  /* === SKILL BADGE === */
  .skill-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    transition: all 0.2s;
    cursor: default;
  }
  .skill-badge:hover { border-color: var(--accent-blue); background: rgba(59,158,255,0.08); }
  .skill-badge.high { border-color: rgba(16,217,138,0.3); color: var(--accent-emerald); background: rgba(16,217,138,0.06); }
  .skill-badge.medium { border-color: rgba(245,158,11,0.3); color: var(--accent-amber); background: rgba(245,158,11,0.06); }
  .skill-badge.low { border-color: rgba(244,63,94,0.3); color: var(--accent-rose); background: rgba(244,63,94,0.06); }

  /* === TAG === */
  .tag {
    display: inline-flex; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .tag-blue { background: rgba(59,158,255,0.12); color: var(--accent-blue); }
  .tag-violet { background: rgba(139,92,246,0.12); color: var(--accent-violet); }
  .tag-emerald { background: rgba(16,217,138,0.12); color: var(--accent-emerald); }
  .tag-amber { background: rgba(245,158,11,0.12); color: var(--accent-amber); }
  .tag-rose { background: rgba(244,63,94,0.12); color: var(--accent-rose); }

  /* === CHART BARS === */
  .chart-bar-group { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
  .chart-bar {
    flex: 1; border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--accent-blue), rgba(59,158,255,0.2));
    transition: all 0.3s ease;
    position: relative; cursor: pointer;
  }
  .chart-bar:hover { filter: brightness(1.2); }
  .chart-bar::after {
    content: attr(data-val);
    position: absolute; bottom: calc(100% + 4px);
    left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--text-muted);
    opacity: 0; transition: opacity 0.2s;
    white-space: nowrap;
  }
  .chart-bar:hover::after { opacity: 1; }

  /* === TIMELINE DOT === */
  .timeline { position: relative; }
  .timeline-item { display: flex; gap: 16px; padding-bottom: 20px; position: relative; }
  .timeline-item::before {
    content: ''; position: absolute;
    left: 11px; top: 26px; bottom: 0; width: 1px;
    background: var(--border);
  }
  .timeline-item:last-child::before { display: none; }
  .timeline-dot {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    border: 2px solid var(--border);
    background: var(--bg-surface);
  }
  .timeline-dot.done { background: var(--accent-emerald); border-color: var(--accent-emerald); color: white; }
  .timeline-dot.active { background: var(--accent-blue); border-color: var(--accent-blue); color: white;
    box-shadow: 0 0 12px rgba(59,158,255,0.4); animation: pulse 2s infinite; }
  .timeline-dot.upcoming { background: var(--bg-elevated); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 8px rgba(59,158,255,0.3); } 50% { box-shadow: 0 0 20px rgba(59,158,255,0.6); } }

  /* === HEATMAP === */
  .heatmap { display: flex; gap: 3px; }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell {
    width: 12px; height: 12px; border-radius: 2px;
    background: rgba(255,255,255,0.05);
    transition: all 0.2s;
    cursor: pointer;
  }
  .heatmap-cell:hover { transform: scale(1.3); }
  .heatmap-cell.l1 { background: rgba(59,158,255,0.2); }
  .heatmap-cell.l2 { background: rgba(59,158,255,0.4); }
  .heatmap-cell.l3 { background: rgba(59,158,255,0.65); }
  .heatmap-cell.l4 { background: rgba(59,158,255,0.9); box-shadow: 0 0 4px rgba(59,158,255,0.4); }

  /* === RADAR CHART (SVG) === */
  .radar-wrapper { display: flex; align-items: center; justify-content: center; }

  /* === CONSTELLATION === */
  .constellation-wrapper {
    position: relative; height: 320px;
    background: radial-gradient(ellipse at center, rgba(59,158,255,0.05) 0%, transparent 70%);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .skill-node {
    position: absolute; transform: translate(-50%,-50%);
    cursor: pointer; transition: all 0.3s ease;
  }
  .skill-node-inner {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; text-align: center;
    border: 2px solid;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
  }
  .skill-node:hover .skill-node-inner { transform: scale(1.2); }
  .skill-node-label {
    position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    font-size: 10px; white-space: nowrap; color: var(--text-secondary);
  }
  .constellation-line {
    position: absolute; pointer-events: none;
    stroke: rgba(59,158,255,0.15); stroke-width: 1;
  }

  /* === AI CHAT === */
  .chat-container { display: flex; flex-direction: column; height: 360px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg { display: flex; gap: 10px; max-width: 85%; }
  .chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .chat-bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 13px; line-height: 1.5;
  }
  .chat-msg.ai .chat-bubble { background: rgba(59,158,255,0.1); border: 1px solid rgba(59,158,255,0.2); }
  .chat-msg.user .chat-bubble { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); }
  .chat-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .chat-ai-avatar { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); animation: pulse 3s infinite; }
  .chat-input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
  .chat-input {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 9px 14px;
    color: var(--text-primary); font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent-blue); }

  /* === LANDING PAGE === */
  .landing { min-height: 100vh; }

  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 24px; text-align: center; position: relative;
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(59,158,255,0.08); border: 1px solid rgba(59,158,255,0.2);
    border-radius: 20px; padding: 6px 16px;
    font-size: 12px; font-weight: 600; color: var(--accent-blue);
    margin-bottom: 28px;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .hero-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-cyan); animation: pulse 2s infinite; }

  .hero-title {
    font-size: clamp(40px, 7vw, 88px); font-weight: 900; line-height: 1.05;
    letter-spacing: -0.03em; margin-bottom: 24px; max-width: 900px;
  }
  .hero-title .gradient-text {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan), var(--accent-violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: clamp(16px, 2vw, 20px); color: var(--text-secondary); max-width: 560px;
    margin-bottom: 40px; font-weight: 350; line-height: 1.7;
  }

  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 64px; }
  .btn-hero-primary {
    padding: 14px 28px; font-size: 15px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
    color: white; border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 0 40px rgba(59,158,255,0.3), 0 0 80px rgba(139,92,246,0.15);
    transition: all 0.3s ease;
  }
  .btn-hero-primary:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(59,158,255,0.5); }
  .btn-hero-ghost {
    padding: 14px 28px; font-size: 15px; font-weight: 500;
    background: rgba(255,255,255,0.04); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-hero-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

  .hero-stats { display: flex; gap: 48px; justify-content: center; flex-wrap: wrap; }
  .hero-stat-num { font-size: 28px; font-weight: 800; color: var(--accent-blue); }
  .hero-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* === FLOATING CARDS === */
  .floating-preview {
    position: absolute;
    background: rgba(10,18,32,0.9); border: 1px solid var(--border-bright);
    border-radius: var(--radius-lg); padding: 16px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: floatCard 6s ease-in-out infinite;
  }
  @keyframes floatCard {
    0%,100% { transform: translateY(0) rotate(var(--r,0deg)); }
    50% { transform: translateY(-12px) rotate(var(--r,0deg)); }
  }
  .floating-preview.card-1 { top: 15%; right: 5%; --r: 3deg; width: 180px; animation-delay: 0s; }
  .floating-preview.card-2 { bottom: 20%; left: 5%; --r: -2deg; width: 160px; animation-delay: 2s; }
  .floating-preview.card-3 { top: 40%; right: 8%; --r: 1deg; width: 150px; animation-delay: 4s; }

  /* === SECTION === */
  .section { padding: 100px 24px; max-width: 1200px; margin: 0 auto; }
  .section-eyebrow { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-blue); margin-bottom: 16px; }
  .section-title { font-size: clamp(28px, 4vw, 48px); font-weight: 800; line-height: 1.15; margin-bottom: 16px; letter-spacing: -0.02em; }
  .section-sub { font-size: 17px; color: var(--text-secondary); max-width: 560px; line-height: 1.7; margin-bottom: 56px; }

  /* === FEATURE GRID === */
  .features-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .feature-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 28px;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }

function AnimatedCounter({ target, duration = 2000, suffix = '' }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          setVal(Math.floor(ease * target));
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target, duration]);
  return <span ref={ref} className="counter">{val.toLocaleString()}{suffix}</span>;
}

function ScoreRing({ score, color, size = 90, stroke = 7 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  return (
    <div className="score-ring" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ filter: `drop-shadow(0 0 6px ${color})`, transition: 'stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1)' }}/>
      </svg>
      <div className="score-ring-value" style={{ color }}>{score}</div>
    </div>
  );
}

function RadarChart({ data, size = 200 }) {
  const center = size / 2;
  const radius = size * 0.38;
  const n = data.length;
  const points = data.map((d, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    const r = (d.value / 100) * radius;
    return { x: center + r * Math.cos(angle), y: center + r * Math.sin(angle), lx: center + (radius + 22) * Math.cos(angle), ly: center + (radius + 22) * Math.sin(angle), label: d.label };
  });
  const polyPts = points.map(p => `${p.x},${p.y}`).join(' ');
  const gridLevels = [0.25, 0.5, 0.75, 1.0];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {gridLevels.map(l => {
        const gpts = data.map((_, i) => {
          const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
          return `${center + l * radius * Math.cos(angle)},${center + l * radius * Math.sin(angle)}`;
        }).join(' ');
        return <polygon key={l} points={gpts} fill="none" stroke="rgba(99,179,237,0.1)" strokeWidth="1"/>;
      })}
      {data.map((_, i) => {
        const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
        return <line key={i} x1={center} y1={center} x2={center + radius * Math.cos(angle)} y2={center + radius * Math.sin(angle)} stroke="rgba(99,179,237,0.1)" strokeWidth="1"/>;
      })}
      <polygon points={polyPts} fill="rgba(59,158,255,0.15)" stroke="#3b9eff" strokeWidth="2" style={{ filter: 'drop-shadow(0 0 8px rgba(59,158,255,0.4))' }}/>
      {points.map((p, i) => (
        <g key={i}>
          <circle cx={p.x} cy={p.y} r="3" fill="#3b9eff" style={{ filter: 'drop-shadow(0 0 4px #3b9eff)' }}/>
          <text x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="middle" fill="#7fa8c9" fontSize="9" fontWeight="500">{p.label}</text>
        </g>
      ))}
    </svg>
  );
}

function Heatmap() {
  const weeks = 26;

}

function GalaxyCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const W = canvas.width, H = canvas.height;
    const nodes = skills.map((s, i) => ({
      x: 80 + (i % 5) * ((W - 160) / 4) + (Math.random() - 0.5) * 30,
      y: 60 + Math.floor(i / 5) * ((H - 100) / 2) + (Math.random() - 0.5) * 20,
      r: 6 + (s.level / 100) * 12,
      label: s.name, level: s.level,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    }));

    let animId;
    const draw = () => {
      ctx.clearRect(0, 0, W, H);

      // Connections
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 200) {
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(59,158,255,${0.15 * (1 - dist/200)})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

      // Nodes
      nodes.forEach(n => {
        const colors = ['#3b9eff','#8b5cf6','#10d98a','#00d4ff','#f59e0b'];
        const col = colors[Math.floor(n.level / 20)];
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        grad.addColorStop(0, col); grad.addColorStop(1, col + '44');
        ctx.fillStyle = grad;
        ctx.shadowBlur = 12; ctx.shadowColor = col;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#7fa8c9'; ctx.font = '9px Inter';
        ctx.textAlign = 'center'; ctx.fillText(n.label, n.x, n.y + n.r + 12);

        n.x += n.vx; n.y += n.vy;
        if (n.x < 20 || n.x > W - 20) n.vx *= -1;
        if (n.y < 20 || n.y > H - 20) n.vy *= -1;
      });

      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(animId);
  }, []);
  return <canvas ref={canvasRef} style={{ width: '100%', height: '100%', display: 'block' }}/>;
}

function App() {
  const [view, setView] = useState('landing');

  const [collapsed, setCollapsed] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);

  const pageMap = {
    dashboard: { component: <Dashboard/>, title: 'Command Center', subtitle: 'Your career at a glance' },
    skills:    { component: <SkillPage/>,  title: 'Skill Gap Analyzer', subtitle: 'AI Skill Constellation' },
    resume:    { component: <ResumePage/>, title: 'Resume Intelligence', subtitle: 'AI-powered analysis' },
    github:    { component: <GitHubPage/>, title: 'GitHub Insights', subtitle: '@alexkim · 34 repos' },
    roadmap:   { component: <RoadmapPage/>, title: 'Growth Roadmap', subtitle: 'Senior → Staff Engineer' },
    interview: { component: <InterviewPage/>, title: 'Interview Simulator', subtitle: 'AI Interviewer ready' },
    career:    { component: <CareerPage/>, title: 'Career Command', subtitle: 'Opportunity radar live' },
  };

  const handleNav = (id) => {
    setActivePage(id);
    setMobileOpen(false);
  };

  if (view === 'landing') {
    return (
      <div className="app-shell">
        <div className="aurora"/>
        <div className="grid-overlay"/>
        <Landing onEnter={() => setView('app')}/>
      </div>
    );
  }

  const current = pageMap[activePage];

  return (
    <div className="app-shell">
      <div className="aurora"/>
      <div className="grid-overlay"/>

      {/* Mobile menu toggle */}
      <div className="mobile-menu-btn" onClick={() => setMobileOpen(!mobileOpen)}>
        {mobileOpen ? '✕' : '☰'}
      </div>

      {/* Sidebar overlay for mobile */}
      {mobileOpen && (
        <div onClick={() => setMobileOpen(false)}
          style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', zIndex:99 }}/>
      )}

      <Sidebar
        active={activePage}
        onNav={handleNav}
        collapsed={collapsed}
        onCollapse={() => setCollapsed(!collapsed)}
        mobileOpen={mobileOpen}
      />

      <div className={`main-content ${collapsed ? 'expanded' : ''}`}>
        <div className="topbar">
          <button className="btn btn-ghost" style={{ display:'none' }} onClick={() => setCollapsed(!collapsed)}>
            ◀
          </button>
          <div>
            <div className="topbar-title">{current.title}</div>
            <div className="topbar-subtitle">{current.subtitle}</div>

            <button className="btn btn-ghost" style={{ fontSize:18, padding:'6px 10px' }}>🔔</button>
            <button className="btn btn-primary" onClick={() => setView('landing')}>← Landing</button>
          </div>
        </div>

        <div style={{ overflowY:'auto' }}>
          {current.component}
        </div>
      </div>
    </div>
  );
}
